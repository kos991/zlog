name: build-deb

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: "Debian package version"
        required: false
        default: "0.1.0"

permissions:
  contents: read

jobs:
  build:
    name: build ${{ matrix.goarch }} deb
    runs-on: ubuntu-22.04
    env:
      CGO_ENABLED: 0
      GOFLAGS: -mod=mod
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            cc: gcc
            apt: gcc
          - goarch: arm64
            cc: aarch64-linux-gnu-gcc
            apt: gcc-aarch64-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: false

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends dpkg-dev git ${{ matrix.apt }}

      - name: Run all unit tests
        run: go test ./internal/... -count=1 -v

      - name: Build deb
        env:
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc }}
          VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          VERSION="${VERSION#v}"
          if [ -z "${VERSION}" ] || [ "${VERSION}" = "master" ]; then
            VERSION="0.1.0"
          fi
          VERSION="${VERSION}" bash scripts/build-deb.sh

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: sangfor-log-search-${{ matrix.goarch }}-deb
          path: dist/*.deb
          if-no-files-found: error
          retention-days: 30
