name: ci-test

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-test:
    name: unit tests
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: true

      - name: Run all unit tests
        run: go test ./internal/... -count=1 -v

      - name: Build zlog binary
        run: go build -o /tmp/zlog ./cmd/zlog

      - name: Verify docker compose config
        run: docker compose config >/dev/null

  docker-smoke:
    name: docker smoke test
    runs-on: ubuntu-22.04
    needs: unit-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and start services
        run: |
          docker compose up --build -d
          sleep 15

      - name: Run smoke test
        run: bash scripts/smoke.sh

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
