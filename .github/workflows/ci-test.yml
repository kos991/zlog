name: ci-test

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-test:
    name: unit tests
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: true
          cache-dependency-path: go.mod

      - name: Tidy modules
        env:
          CGO_ENABLED: 0
        run: go mod tidy

      - name: Run all unit tests
        env:
          CGO_ENABLED: 0
        run: |
          set -o pipefail
          go test -mod=mod ./internal/... -count=1 -v 2>&1 | tee /tmp/test-output.txt

      - name: Build zlog binary
        env:
          CGO_ENABLED: 0
        run: go build -o /tmp/zlog ./cmd/zlog

      - name: Verify docker compose config
        run: docker compose config >/dev/null

  docker-smoke:
    name: docker smoke test
    runs-on: ubuntu-22.04
    needs: unit-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Seed sample data
        run: bash scripts/seed-sample.sh data

      - name: Build and start services
        run: |
          docker compose up --build -d
          sleep 15

      - name: Run smoke test
        run: bash scripts/smoke.sh

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
