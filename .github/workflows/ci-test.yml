name: ci-test

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-test:
    name: unit tests
    runs-on: ubuntu-22.04
    env:
      CGO_ENABLED: 0
      GOFLAGS: -mod=mod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: false

      - name: Run all unit tests
        run: |
          go test ./internal/... -count=1 -v 2>&1 | tee /tmp/test-output.log
          exit ${PIPESTATUS[0]}

      - name: Dump output to summary on failure
        if: failure()
        run: |
          echo "## Test Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/test-output.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload test log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: /tmp/test-output.log

      - name: Build zlog binary
        run: go build -o /tmp/zlog ./cmd/zlog

      - name: Verify docker compose config
        run: docker compose config >/dev/null

  docker-smoke:
    name: docker smoke test
    runs-on: ubuntu-22.04
    needs: unit-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Seed sample data
        run: bash scripts/seed-sample.sh data

      - name: Build and start services
        run: |
          docker compose up --build -d
          sleep 15

      - name: Run smoke test
        run: bash scripts/smoke.sh

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
