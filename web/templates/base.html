<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title | default "zlog"}}</title>
    <link rel="stylesheet" href="/static/app.css">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="brand">
            <span class="brand-mark">Z</span>
            zlog
        </a>
        <div class="nav-links">
            <a href="/" class="{{if eq .Page "dashboard"}}active{{end}}">查询</a>
            <a href="/tasks" class="{{if eq .Page "tasks"}}active{{end}}">任务</a>
            <a href="/ip-ranges" class="{{if eq .Page "ip_ranges"}}active{{end}}">IP 段</a>
            <a href="/settings" class="{{if eq .Page "settings"}}active{{end}}">设置</a>
            <a href="/logout">退出</a>
        </div>
    </nav>
    <main class="container">
        {{template "content" .}}
    </main>
    <script src="/static/app.js"></script>
</body>
</html>
