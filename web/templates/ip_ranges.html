{{define "content"}}
<div class="ip-ranges-page">
    <div class="page-header">
        <h1>自定义 IP 段</h1>
    </div>
    <div class="panel">
        <div class="panel-body">
            <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px">自定义 CIDR 优先于内置归属库。</p>
            <form id="ip-range-form">
                <label><span>CIDR</span><input type="text" name="cidr" placeholder="如 58.216.48.0/24" required></label>
                <label><span>名称</span><input type="text" name="name" placeholder="如 出口公网IP" required></label>
                <label><span>国家</span><input type="text" name="country"></label>
                <button type="submit" class="btn btn-primary">添加</button>
            </form>
        </div>
        <div class="table-wrap">
            <table class="log-table">
                <thead>
                    <tr>
                        <th>CIDR</th>
                        <th>名称</th>
                        <th>国家</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="ranges-tbody">
                    <tr class="placeholder-row"><td colspan="4">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
{{end}}
