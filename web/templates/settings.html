{{define "content"}}
<div class="settings-page">
    <h1>设置</h1>
    <form id="settings-form">
        <label>扫描间隔（秒） <input type="number" name="scan_interval" value="300"></label>
        <label>批量大小 <input type="number" name="batch_size" value="5000"></label>
        <label>导出保留天数 <input type="number" name="retention_days" value="7"></label>
        <button type="submit">保存</button>
    </form>
    <div class="admin-section">
        <h2>修改密码</h2>
        <form id="password-form">
            <label>新密码 <input type="password" name="password" required></label>
            <button type="submit">更新</button>
        </form>
    </div>
</div>
{{end}}
