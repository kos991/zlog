{{define "content"}}
<div class="tasks-page">
    <div class="page-header">
        <h1>任务中心</h1>
        <div class="header-actions">
            <button id="trigger-import" class="btn btn-primary btn-sm">触发导入</button>
        </div>
    </div>
    <div class="panel">
        <div class="table-wrap">
            <table class="log-table">
                <thead>
                    <tr>
                        <th>任务 ID</th>
                        <th>类型</th>
                        <th>状态</th>
                        <th>进度</th>
                        <th>来源</th>
                        <th>创建时间</th>
                        <th>错误</th>
                    </tr>
                </thead>
                <tbody id="jobs-tbody">
                    <tr class="placeholder-row"><td colspan="7">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
{{end}}
